class_path: train_stage1.VQPriorityStage1Module
seg_model:
  class_path: models.SMPModel
  init_args:
    encoder_name: resnet18
    n_channels: 40
    flatten_temporal_dimension: true
    pos_class_weight: 490.1
    loss_function: Focal
vqvae:
  class_path: models.vq_vae.VQVAE
  init_args:
    in_channels: 512
    embedding_dim: 256
    num_embeddings: 64
    commitment_cost: 0.25
    decay: 0.99
    flatten_temporal: false
vq_loss_weight: 1.0
recon_loss_weight: 1.0
