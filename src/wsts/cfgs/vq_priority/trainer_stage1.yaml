accelerator: gpu
strategy: auto
devices: 1
num_nodes: 1
logger:
  class_path: pytorch_lightning.loggers.wandb.WandbLogger
  init_args:
    project: WildfireSpreadPrediction
    log_model: true
callbacks:
  - class_path: pytorch_lightning.callbacks.model_checkpoint.ModelCheckpoint
    init_args:
      monitor: val_f1
      mode: max
  - class_path: pytorch_lightning.callbacks.early_stopping.EarlyStopping
    init_args:
      monitor: val_f1
      mode: max
      patience: 15
      min_delta: 1e-4
fast_dev_run: false
max_epochs: 100
min_epochs: 10
