name: wispr

services:
  frontend-build:
    container_name: ${COMPOSE_PROJECT_NAME:-wispr}-frontend-build
    build:
      dockerfile: ./frontend/frontend.build.Containerfile
      network: host
    command: npm run build # echo $VITE_MAPBOX_TOKEN
    environment:
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    volumes:
      - ${FE_BUILD_TARGET_DIR_HOST:-/u50/group17/dist}:/app/dist:Z,rw
    profiles:
      - web-build

  web:
    container_name: ${COMPOSE_PROJECT_NAME:-wispr}-web
    image: nginx:1.29
    depends_on: backend
    # command: cat /etc/hosts # container internetworking debug
    # networks: 
    #   - wispr-network
    network_mode: host
    ports:
      - 5173:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:Z,ro
      - /u50/group17/dist/:/usr/share/nginx/www:Z,ro

  testcont:
    container_name: ${COMPOSE_PROJECT_NAME:-wispr}-testcont
    image: rtsp/net-tools:latest
    command: sleep infinity
    profiles:
      - test

  backend:
    container_name: ${COMPOSE_PROJECT_NAME:-wispr}-backend
    # image: <repository-source>
    restart: always
    build:
      dockerfile: ./backend/backend.Containerfile
      network: host
    command: uvicorn main:app --app-dir backend/src --reload --host ${UVICORN_HOST_NAME:-0.0.0.0} --port 8000
    environment:
      # set env vars for inside the container
      - HDF5_ROOT=/app/data/hdf5
    # networks:
      # - wispr-network
    network_mode: host
    ports:
      - 80:8000
    volumes:
      - ${HDF5_ROOT_HOST:-/u50/group17/data/hdf5}:/app/data/hdf5:Z,ro
      - ${MODEL_CHECKPOINT_HOST:-/u50/group17/models/model.ckpt}:/app/backend/resources/model.ckpt:Z,rw

