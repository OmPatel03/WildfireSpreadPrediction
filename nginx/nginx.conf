# Cloudflare-aware client key: use CF-Connecting-IP when present, else fallback to source IP.
map $http_cf_connecting_ip $wildfire_client_ip {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}

# SRS knobs (static here, can be templated):
# WILDFIRE_RATE_LIMIT_INFER=6r/m
# WILDFIRE_RATE_LIMIT_READ=120r/m
limit_req_zone $wildfire_client_ip zone=wildfire_infer_limit:10m rate=6r/m;
limit_req_zone $wildfire_client_ip zone=wildfire_read_limit:10m rate=120r/m;

log_format wildfire_cf '$remote_addr cfip=$http_cf_connecting_ip '
                       'cf_ray=$http_cf_ray [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time';

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name wispr.cas.mcmaster.ca;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    limit_req_status 429;
    error_page 429 = @rate_limited;

    access_log /var/log/nginx/access.log wildfire_cf;

    location / {
        root /usr/share/nginx/www;
        index index.html;
    }

    location = /api/findSpread {
        limit_req zone=wildfire_infer_limit burst=3 nodelay;
        add_header X-RateLimit-Policy "strict-inference" always;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
        send_timeout 180;
    }

    location = /api/graphql {
        limit_req zone=wildfire_infer_limit burst=2 nodelay;
        add_header X-RateLimit-Policy "strict-graphql" always;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
        send_timeout 180;
    }

    location ~ ^/api/fires/[^/]+/layers$ {
        limit_req zone=wildfire_infer_limit burst=3 nodelay;
        add_header X-RateLimit-Policy "strict-layers" always;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
        send_timeout 180;
    }

    location ~ ^/api/(catalog|overview|years|good-predictions|fires/[^/]+/timeline)$ {
        limit_req zone=wildfire_read_limit burst=40 nodelay;
        add_header X-RateLimit-Policy "standard-read" always;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
        send_timeout 180;
    }

    location /api/ {
        limit_req zone=wildfire_read_limit burst=80 nodelay;
        add_header X-RateLimit-Policy "default" always;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_read_timeout 180;
        proxy_connect_timeout 180;
        proxy_send_timeout 180;
        send_timeout 180;
    }

    location @rate_limited {
        default_type application/json;
        add_header Retry-After 1 always;
        add_header Cache-Control "no-store" always;
        return 429 '{"detail":"Too many requests. Please retry shortly."}';
    }
}
